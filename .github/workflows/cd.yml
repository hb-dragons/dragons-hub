name: CD

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deliver:
    name: Build and Package
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TURBO_API: http://localhost:9080
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}
      TURBO_TEAM: dragons
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup
        uses: ./.github/actions/setup
        with:
          turbo-cache: "true"
          gcp-workload-identity-provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp-service-account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: AI slop check
        run: pnpm check:ai-slop

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Coverage
        run: pnpm coverage

      - name: Build
        run: pnpm build

      - name: Pack artifacts
        run: mkdir -p artifacts && tar -czf artifacts/api-dist.tar.gz -C apps/api dist && tar -czf artifacts/web-standalone.tar.gz -C apps/web .next/standalone .next/static public

      - name: Upload build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: build-artifacts
          path: artifacts/*.tar.gz
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: deliver
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8
        with:
          name: build-artifacts
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
