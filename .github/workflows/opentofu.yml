name: Infrastructure (OpenTofu)

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/opentofu.yml"
  pull_request:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/opentofu.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  TOFU_VERSION: "1.6.0"

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Format Check
        run: tofu fmt -check -recursive
        working-directory: infra

  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    defaults:
      run:
        working-directory: infra/environments/production
    env:
      TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
      TF_VAR_project_number: ${{ vars.GCP_PROJECT_NUMBER }}
      TF_VAR_region: ${{ vars.GCP_REGION }}
      TF_VAR_github_org: ${{ github.repository_owner }}
      TF_VAR_github_repo: ${{ github.event.repository.name }}
      TF_VAR_web_domain: ${{ vars.WEB_DOMAIN }}
      TF_VAR_api_domain: ${{ vars.API_DOMAIN }}
      TF_VAR_sdk_username: ${{ secrets.SDK_USERNAME }}
      TF_VAR_sdk_password: ${{ secrets.SDK_PASSWORD }}
      TF_VAR_referee_sdk_username: ${{ secrets.REFEREE_SDK_USERNAME }}
      TF_VAR_referee_sdk_password: ${{ secrets.REFEREE_SDK_PASSWORD }}
      TF_VAR_scoreboard_device_id: ${{ vars.SCOREBOARD_DEVICE_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Initialize
        run: tofu init

      - name: Validate
        run: tofu validate

      - name: Plan
        id: plan
        run: tofu plan -input=false -out=tfplan -no-color 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Comment Plan on PR
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('infra/environments/production/plan_output.txt', 'utf8');
            const truncated = planOutput.length > 60000
              ? planOutput.substring(0, 60000) + '\n\n... (truncated)'
              : planOutput;
            const body = `## OpenTofu Plan\n\n<details>\n<summary>Show Plan Output</summary>\n\n\`\`\`hcl\n${truncated}\n\`\`\`\n\n</details>\n\n**Status:** ${{ steps.plan.outcome }}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Upload Plan
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: tfplan-production
          path: infra/environments/production/tfplan
          retention-days: 7

      - name: Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
    environment: production
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: infra/environments/production
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Download Plan
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8
        with:
          name: tfplan-production
          path: infra/environments/production

      - name: Initialize
        run: tofu init

      - name: Apply
        run: tofu apply -auto-approve tfplan

      - name: Summary
        run: |
          echo "## Infrastructure Applied" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          tofu output -json | jq -r 'to_entries[] | "- **\(.key):** \(.value.value)"' >> $GITHUB_STEP_SUMMARY
