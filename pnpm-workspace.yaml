packages:
  - apps/*
  - packages/*
overrides:
  replace>minimatch: 3.1.5
  '@prisma/dev>hono': '>=4.12.18'
  '@prisma/dev>@hono/node-server': '>=1.19.13'
  tar: '>=7.5.11'
  flatted: '>=3.4.0'
  undici: '>=7.24.0'
  fast-xml-parser: '>=5.7.0'
  fast-xml-builder: '>=1.1.7'
  effect: '>=3.20.0'
  lodash: '>=4.18.0'
  '@xmldom/xmldom': ^0.8.13
  next: '>=16.2.6'
  kysely: 0.28.17
  '@tootallnate/once': '>=3.0.1'
  postcss: '>=8.5.10'
  '@esbuild-kit/core-utils>esbuild': '>=0.25.0'
  '@instantdb/core>uuid': '>=11.1.1'
allowBuilds:
  basketball-bund-sdk: true
  esbuild: true
  '@swc/core': true
  '@parcel/watcher': true
  core-js: false
  msgpackr-extract: false
  sharp: false
  unrs-resolver: false
auditConfig:
  # All advisories below sit in apps/mobile build-time tooling
  # (@capacitor/assets -> @capacitor/cli@5.7.8 / @trapezedev/project) which
  # only runs at icon/splash generation against repo-controlled input.
  # Pnpm overrides cannot reach these pinned transitives. Unignore once
  # @capacitor/assets ships a newer @capacitor/cli + @trapezedev/project.
  ignoreGhsas:
    - GHSA-23c5-xmqv-rm74  # minimatch ReDoS (replace>minimatch@3.0.5)
    - GHSA-34x7-hfp2-rc4v  # tar arbitrary file overwrite
    - GHSA-3ppc-4f35-3m26  # minimatch ReDoS (wildcard)
    - GHSA-7r86-cg39-jmmj  # minimatch ReDoS (matchOne)
    - GHSA-83g3-92jg-28cx  # tar hardlink path traversal
    - GHSA-8qq5-rm4j-mr97  # tar arbitrary file overwrite
    - GHSA-9ppj-qmqm-q256  # tar symlink path traversal
    - GHSA-qffp-2rhf-9h96  # tar hardlink path traversal (drive-relative)
    - GHSA-r6q2-hw4h-h46w  # tar race condition (APFS Unicode)
    - GHSA-2v35-w6hq-6mfw  # @xmldom/xmldom (@trapezedev/project chain)
    - GHSA-f6ww-3ggp-fr8h  # @xmldom/xmldom (@trapezedev/project chain)
    - GHSA-j759-j44w-7fr8  # @xmldom/xmldom (@trapezedev/project chain)
    - GHSA-wh4c-j3r5-mjhp  # @xmldom/xmldom (@trapezedev/project chain)
    - GHSA-x6wf-f3px-wcqx  # @xmldom/xmldom (@trapezedev/project chain)
